[package]
name = "d2-lib-web"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "wasm-bindgen wrapper for d2-lib — run D2 diagrams → SVG in the browser"
homepage = "https://github.com/kookyleo/d2-little"
repository = "https://github.com/kookyleo/d2-little"
keywords = ["d2", "diagram", "svg", "wasm", "web"]
categories = ["wasm", "graphics"]
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

# wasm-opt default args don't include --enable-bulk-memory, but rustc now
# emits memory.copy / memory.fill instructions for wasm32 (raised baseline).
# Pass both feature flags through so optimisation doesn't reject the input.
[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-O", "--enable-bulk-memory", "--enable-nontrapping-float-to-int"]

[package.metadata.wasm-pack.profile.dev]
wasm-opt = false

[dependencies]
d2-lib = { path = "../../crates/d2-lib" }
wasm-bindgen = "0.2"
