name: Release

# Tag-driven publish to crates.io + npm.
#
# Push a `vX.Y.Z` tag to main to trigger. The root `Cargo.toml`
# `[package].version` must already match (e.g. `0.7.2` for tag
# `v0.7.2`). The `packages/web/package.json` version must also match —
# both artefacts ship under the same version, same tag.
#
# Publish is gated behind the full quality suite: fmt, clippy
# (-D warnings), unit tests, and integration tests. If the gate trips,
# the tag publishes nothing.
#
# Since the 0.7.2 flatten, `d2-little` is a single crate with no path
# siblings, so `cargo publish -p d2-little` can now verify and publish
# cleanly without any `--no-verify` workaround.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  gate:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify tag matches package + packages/web versions
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg_version=$(awk -F'"' '/^\[package\]/ {f=1} f && /^version = / {print $2; exit}' Cargo.toml)
          if [ "$tag" != "$pkg_version" ]; then
            echo "::error::Tag v${tag} does not match [package] version ${pkg_version} in Cargo.toml"
            exit 1
          fi
          web_version=$(node -p "require('./packages/web/package.json').version")
          if [ "$tag" != "$web_version" ]; then
            echo "::error::Tag v${tag} does not match packages/web/package.json version ${web_version}"
            exit 1
          fi
          echo "Publishing d2-little ${pkg_version} (crates.io + npm)"

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --lib -p d2-little

      - name: Integration tests
        run: cargo test --test '*' -p d2-little

  publish-crates-io:
    name: Publish d2-little to crates.io
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        # Idempotent: treat "already exists on crates.io" as a no-op
        # success so re-pushing the same tag (e.g. to retry an npm
        # publish after a token fix) doesn't cascade a cosmetic failure.
        run: |
          set +e
          out=$(cargo publish -p d2-little --token "${{ secrets.CARGO_TOKEN }}" 2>&1)
          rc=$?
          echo "$out"
          if [ $rc -eq 0 ]; then exit 0; fi
          if echo "$out" | grep -qE "already (exists|uploaded)"; then
            echo "::notice::crates.io already has this version — skipping publish."
            exit 0
          fi
          exit "$rc"

  publish-npm-web:
    name: Publish @kookyleo/d2-little-web to npm
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.13.1"

      - name: Build wasm (packages/web)
        working-directory: packages/web
        run: |
          wasm-pack build --target bundler --out-dir dist/wasm --out-name d2_little_web
          rm -f dist/wasm/package.json dist/wasm/.gitignore dist/wasm/README.md

      - name: Install & build TypeScript wrapper
        working-directory: packages/web
        run: |
          npm install --no-audit --no-fund
          npm run build:ts

      - name: Verify dist layout
        working-directory: packages/web
        run: |
          ls -la dist
          ls -la dist/wasm
          test -f dist/index.js
          test -f dist/index.d.ts
          test -f dist/wasm/d2_little_web.js
          test -f dist/wasm/d2_little_web_bg.wasm

      - name: Publish to npm
        working-directory: packages/web
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
